name: Release smartsub-engine

# 构建并发布到 rolling `latest` Release，供 SmartSub 按需下载。
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: smartsub-py-engine-release
  cancel-in-progress: true

jobs:
  build_engine:
    name: Engine ${{ matrix.artifact_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_suffix: macos-arm64
            binary: dist/smartsub-engine/smartsub-engine
          - os: macos-15-intel
            artifact_suffix: macos-x64
            binary: dist/smartsub-engine/smartsub-engine
          - os: windows-2022
            artifact_suffix: windows-x64
            binary: dist/smartsub-engine/smartsub-engine.exe
          - os: ubuntu-22.04
            artifact_suffix: linux-x64
            binary: dist/smartsub-engine/smartsub-engine

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build frozen engine
        run: pyinstaller --clean --noconfirm smartsub-engine.spec

      - name: Smoke test
        run: python smoke_test.py ${{ matrix.binary }}

      - name: Archive
        shell: bash
        run: tar -czf smartsub-engine-${{ matrix.artifact_suffix }}.tar.gz -C dist smartsub-engine

      - uses: actions/upload-artifact@v4
        with:
          name: py-engine-${{ matrix.artifact_suffix }}
          path: smartsub-engine-${{ matrix.artifact_suffix }}.tar.gz
          if-no-files-found: error

  publish_latest:
    name: Publish latest Release
    runs-on: ubuntu-latest
    needs: build_engine
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: actions/checkout@v4
        with:
          path: src

      - name: Generate checksums and manifest
        shell: bash
        run: |
          cd artifacts
          sha256sum smartsub-engine-*.tar.gz > checksums.sha256
          cat checksums.sha256
          ENGINE_VERSION=$(python3 -c "import sys; sys.path.insert(0,'../src'); import _version; print(_version.ENGINE_VERSION)")
          PROTOCOL_VERSION=$(python3 -c "import sys; sys.path.insert(0,'../src'); import _version; print(_version.PROTOCOL_VERSION)")
          BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          python3 - "$ENGINE_VERSION" "$PROTOCOL_VERSION" "$BUILT_AT" "$GIT_SHA" <<'PY'
          import json, os, sys, hashlib
          engine_version, protocol_version, built_at, git_sha = sys.argv[1:5]
          plat = {
              "smartsub-engine-windows-x64.tar.gz": "windows-x64",
              "smartsub-engine-macos-arm64.tar.gz": "macos-arm64",
              "smartsub-engine-macos-x64.tar.gz": "macos-x64",
              "smartsub-engine-linux-x64.tar.gz": "linux-x64",
          }
          artifacts = {}
          for fname, key in plat.items():
              if not os.path.exists(fname):
                  continue
              data = open(fname, "rb").read()
              artifacts[key] = {
                  "sizeBytes": len(data),
                  "sha256": hashlib.sha256(data).hexdigest(),
              }
          manifest = {
              "engineVersion": engine_version,
              "protocolVersion": int(protocol_version),
              "builtAt": built_at,
              "gitSha": git_sha,
              "engines": ["faster_whisper"],
              "artifacts": artifacts,
          }
          json.dump(manifest, open("manifest.json", "w"), indent=2)
          print(json.dumps(manifest, indent=2))
          PY

      - name: Delete existing latest release
        run: gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          body: |
            Rolling latest build of smartsub-engine (faster-whisper sidecar).
            SmartSub downloads from this release tag automatically.
          files: artifacts/*
          make_latest: true
