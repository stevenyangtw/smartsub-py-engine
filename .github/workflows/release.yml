name: Release smartsub-faster-whisper-runtime

# 构建并发布到 rolling `latest` Release，供 SmartSub 按需下载。
# 产物为**单个自包含运行时**(内嵌 PBS CPython + site-packages/ + main.py)，
# 每个 (os,arch) 一份，由 SmartSub 以 PYTHONHOME/PYTHONPATH 启动其内嵌解释器加载。
# faster-whisper 是唯一 Python 引擎（funasr/qwen/firered 已改用 App 内的 node sherpa addon）。
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: smartsub-py-engine-release
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12.10'

jobs:
  build_runtime:
    name: runtime ${{ matrix.target.artifact_suffix }}
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        # 每个 (os,arch) 在其匹配的原生 runner 上构建（host == target）。
        target:
          - { os: macos-latest, artifact_suffix: macos-arm64 }
          - { os: macos-15-intel, artifact_suffix: macos-x64 }
          # gpu: true 的平台额外构建 Full GPU(CUDA12) 变体（捆绑 cuBLAS/cuDNN，~1.4GB）。
          - { os: windows-2022, artifact_suffix: windows-x64, gpu: true }
          - { os: ubuntu-22.04, artifact_suffix: linux-x64, gpu: true }

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install pinned Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      # 单运行时包：PBS 基座 + uv --only-binary 的官方平台 wheel + main.py，合到一个目录。
      # --only-binary=:all:（在 build_runtime_package.py 内）禁止 sdist 在 runner 源码编译，
      # 故 runner CPU 的指令集绝不会烘进产物（老 CPU 由 ct2/onnxruntime 运行时 ISA 派发兜底）。
      - name: Build self-contained runtime
        run: uv run --python ${{ env.PYTHON_VERSION }} -- python build_runtime_package.py dist/runtime

      - name: Smoke test (package mode)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            PY="dist/runtime/python.exe"
          else
            PY="dist/runtime/bin/python3"
          fi
          "$PY" smoke_test.py --package dist/runtime "$PY"

      - name: Archive (contents at top level, no wrapper dir)
        shell: bash
        run: tar -czf smartsub-faster-whisper-runtime-${{ matrix.target.artifact_suffix }}.tar.gz -C dist/runtime .

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.target.artifact_suffix }}
          path: smartsub-faster-whisper-runtime-${{ matrix.target.artifact_suffix }}.tar.gz
          if-no-files-found: error

      # ---- Full GPU(CUDA12) 变体（仅 windows-x64 / linux-x64）：包名加 -cuda 后缀，不覆盖 CPU 包 ----
      - name: Build self-contained runtime (CUDA)
        if: matrix.target.gpu
        run: uv run --python ${{ env.PYTHON_VERSION }} -- python build_runtime_package.py dist/runtime-cuda --variant cuda

      - name: Smoke test CUDA (package mode)
        if: matrix.target.gpu
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            PY="dist/runtime-cuda/python.exe"
          else
            PY="dist/runtime-cuda/bin/python3"
          fi
          "$PY" smoke_test.py --package dist/runtime-cuda "$PY"

      - name: Archive CUDA (contents at top level, no wrapper dir)
        if: matrix.target.gpu
        shell: bash
        run: tar -czf smartsub-faster-whisper-runtime-${{ matrix.target.artifact_suffix }}-cuda.tar.gz -C dist/runtime-cuda .

      - uses: actions/upload-artifact@v4
        if: matrix.target.gpu
        with:
          name: runtime-${{ matrix.target.artifact_suffix }}-cuda
          path: smartsub-faster-whisper-runtime-${{ matrix.target.artifact_suffix }}-cuda.tar.gz
          if-no-files-found: error

  publish_latest:
    name: Publish latest Release
    runs-on: ubuntu-latest
    needs: [build_runtime]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: actions/checkout@v4
        with:
          path: src

      - name: Generate checksums and manifest
        shell: bash
        env:
          PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
        run: |
          cd artifacts
          sha256sum smartsub-faster-whisper-runtime-*.tar.gz > checksums.sha256
          cat checksums.sha256
          ENGINE_VERSION=$(python3 -c "import sys; sys.path.insert(0,'../src'); import _version; print(_version.ENGINE_VERSION)")
          PROTOCOL_VERSION=$(python3 -c "import sys; sys.path.insert(0,'../src'); import _version; print(_version.PROTOCOL_VERSION)")
          BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          python3 - "$ENGINE_VERSION" "$PROTOCOL_VERSION" "$BUILT_AT" "$GIT_SHA" "$PYTHON_VERSION" <<'PY'
          import json, os, sys, hashlib
          engine_version, protocol_version, built_at, git_sha, python_version = sys.argv[1:6]
          # CPU 包（默认）+ Full GPU(CUDA12) 包（-cuda 后缀，仅 win/linux）。缺失项自动跳过。
          suffixes = [
              "windows-x64", "macos-arm64", "macos-x64", "linux-x64",
              "windows-x64-cuda", "linux-x64-cuda",
          ]

          def runtime_artifacts():
              out = {}
              for suf in suffixes:
                  fname = f"smartsub-faster-whisper-runtime-{suf}.tar.gz"
                  if not os.path.exists(fname):
                      continue
                  data = open(fname, "rb").read()
                  out[suf] = {
                      "sizeBytes": len(data),
                      "sha256": hashlib.sha256(data).hexdigest(),
                  }
              return out

          manifest = {
              "engineVersion": engine_version,
              "protocolVersion": int(protocol_version),
              "pythonVersion": python_version,
              "pythonAbi": "cp312",
              "builtAt": built_at,
              "gitSha": git_sha,
              "engines": ["faster_whisper"],
              "engineId": "faster-whisper",
              # 单自包含运行时（内嵌解释器 + site-packages + main.py），按 (os,arch) 分平台。
              "runtime": {
                  "artifactPattern": "smartsub-faster-whisper-runtime-<suffix>.tar.gz",
                  "artifacts": runtime_artifacts(),
              },
          }
          json.dump(manifest, open("manifest.json", "w"), indent=2)
          print(json.dumps(manifest, indent=2))
          PY

      - name: Delete existing latest release
        run: gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          body: |
            Rolling latest build of the SmartSub faster-whisper runtime.
            Single self-contained runtime (embedded python-build-standalone CPython
            + site-packages/ + main.py); one per (os,arch). SmartSub downloads the
            matching artifact from this tag and spawns its embedded interpreter.
          files: artifacts/*
          make_latest: true
