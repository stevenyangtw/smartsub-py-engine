name: Release smartsub-engine

# 构建并发布到 rolling `latest` Release，供 SmartSub 按需下载。
# 产物为可重定位引擎包(main.py + site-packages/)，由 App 侧 PBS 基座 + PYTHONPATH 加载。
# 产物名按引擎区分(smartsub-<engineId>-<suffix>.tar.gz)，便于后续多引擎(funasr/qwen)共存同一 release。
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: smartsub-py-engine-release
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12.10'
  ENGINE_ID: 'faster-whisper'

jobs:
  build_engine:
    name: Engine ${{ matrix.artifact_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_suffix: macos-arm64
          - os: macos-15-intel
            artifact_suffix: macos-x64
          - os: windows-2022
            artifact_suffix: windows-x64
          - os: ubuntu-22.04
            artifact_suffix: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install pinned Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Build relocatable engine package
        run: uv run --python ${{ env.PYTHON_VERSION }} -- python build_engine_package.py dist/package

      - name: Smoke test (package mode)
        shell: bash
        run: |
          PY="$(uv python find ${PYTHON_VERSION})"
          "$PY" smoke_test.py --package dist/package "$PY"

      - name: Archive (contents at top level, no wrapper dir)
        shell: bash
        run: tar -czf smartsub-${{ env.ENGINE_ID }}-${{ matrix.artifact_suffix }}.tar.gz -C dist/package .

      - uses: actions/upload-artifact@v4
        with:
          name: py-engine-${{ matrix.artifact_suffix }}
          path: smartsub-${{ env.ENGINE_ID }}-${{ matrix.artifact_suffix }}.tar.gz
          if-no-files-found: error

  publish_latest:
    name: Publish latest Release
    runs-on: ubuntu-latest
    needs: build_engine
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: actions/checkout@v4
        with:
          path: src

      - name: Generate checksums and manifest
        shell: bash
        env:
          PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
          ENGINE_ID: ${{ env.ENGINE_ID }}
        run: |
          cd artifacts
          sha256sum smartsub-*.tar.gz > checksums.sha256
          cat checksums.sha256
          ENGINE_VERSION=$(python3 -c "import sys; sys.path.insert(0,'../src'); import _version; print(_version.ENGINE_VERSION)")
          PROTOCOL_VERSION=$(python3 -c "import sys; sys.path.insert(0,'../src'); import _version; print(_version.PROTOCOL_VERSION)")
          BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          python3 - "$ENGINE_VERSION" "$PROTOCOL_VERSION" "$BUILT_AT" "$GIT_SHA" "$PYTHON_VERSION" "$ENGINE_ID" <<'PY'
          import json, os, sys, hashlib
          engine_version, protocol_version, built_at, git_sha, python_version, engine_id = sys.argv[1:7]
          plat = {
              f"smartsub-{engine_id}-windows-x64.tar.gz": "windows-x64",
              f"smartsub-{engine_id}-macos-arm64.tar.gz": "macos-arm64",
              f"smartsub-{engine_id}-macos-x64.tar.gz": "macos-x64",
              f"smartsub-{engine_id}-linux-x64.tar.gz": "linux-x64",
          }
          artifacts = {}
          for fname, key in plat.items():
              if not os.path.exists(fname):
                  continue
              data = open(fname, "rb").read()
              artifacts[key] = {
                  "sizeBytes": len(data),
                  "sha256": hashlib.sha256(data).hexdigest(),
              }
          manifest = {
              "engineVersion": engine_version,
              "protocolVersion": int(protocol_version),
              "pythonVersion": python_version,
              "pythonAbi": "cp312",
              "engineId": engine_id,
              "builtAt": built_at,
              "gitSha": git_sha,
              "engines": ["faster_whisper"],
              "artifacts": artifacts,
          }
          json.dump(manifest, open("manifest.json", "w"), indent=2)
          print(json.dumps(manifest, indent=2))
          PY

      - name: Delete existing latest release
        run: gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          body: |
            Rolling latest build of smartsub-engine relocatable packages.
            Relocatable package (main.py + site-packages/), loaded by SmartSub's
            bundled python-build-standalone base via PYTHONPATH.
            SmartSub downloads from this release tag automatically.
          files: artifacts/*
          make_latest: true

      - name: Upload meta artifact for GitCode sync
        uses: actions/upload-artifact@v4
        with:
          name: py-engine-meta
          path: |
            artifacts/manifest.json
            artifacts/checksums.sha256
          if-no-files-found: error

  sync-gitcode-release:
    name: Sync to GitCode
    needs: publish_latest
    if: ${{ always() && needs.publish_latest.result == 'success' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Sync to GitCode Release
        run: bash scripts/sync-gitcode-release.sh
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          ARTIFACTS_DIR: artifacts
